<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            width: 300px;
            padding: 20px;
            font-family: 'Inter', sans-serif;
            background: #0f0f14;
            color: #f3f4f6;
            margin: 0;
        }
        h2 { margin-top: 0; font-size: 18px; color: #3b82f6; }
        .description { font-size: 12px; color: #9ca3af; margin-bottom: 20px; }
        .setting { margin-bottom: 15px; }
        label { display: block; font-size: 12px; margin-bottom: 5px; }
        select, input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 8px;
            border-radius: 4px;
        }
        .footer {
            margin-top: 20px;
            font-size: 10px;
            text-align: center;
            color: #4b5563;
        }
    </style>
</head>
<body>
    <h2>Token Optimizer</h2>
    <p class="description">Live prompt optimization and cost estimation for your favorite AI chatbots.</p>
    
    <div class="setting">
        <label>Primary Model Pricing</label>
        <select id="model-select">
            <option value="0.0025">GPT-4o ($2.50 / 1M)</option>
            <option value="0.00015">GPT-4o-mini ($0.15 / 1M)</option>
            <option value="0.003">Claude 3.5 Sonnet ($3.00 / 1M)</option>
            <option value="0.000625">Gemini 1.5 Pro ($0.62 / 1M)</option>
        </select>
    </div>

    <div class="setting">
        <label>Status</label>
        <div style="color: #10b981; font-size: 12px;">● Enabled and monitoring chat sites</div>
    </div>

    <div class="footer">
        v1.0.0 | ashwanibindroo-personal
    </div>
</body>
</html>
